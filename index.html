<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2E7D32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="自律森林 - 番茄钟+种树+习惯+目标">
<link rel="manifest" href="manifest.json">
<title>自律森林</title>
<style>
:root{--g:#2E7D32;--gl:#4CAF50;--bg:#f0f4f0;--c:#fff;--t:#1a1a1a;--gr:#888;--r:#e53935;--o:#ff9800;--b:#2196F3;--rad:14px;--sh:0 2px 8px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--t);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;padding-bottom:72px;overscroll-behavior:none;font-size:15px}
body.dark{--bg:#1a1a2e;--c:#16213e;--t:#e0e0e0;--gr:#999;--sh:0 2px 8px rgba(0,0,0,.3)}
.appbar{background:var(--g);color:#fff;padding:12px 16px;text-align:center;font-weight:700;font-size:17px;position:sticky;top:0;z-index:10}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--c);display:flex;border-top:1px solid rgba(0,0,0,.08);z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;text-align:center;padding:7px 0 5px;font-size:10px;color:var(--gr);transition:.15s;cursor:pointer}
.tab.on{color:var(--g)}
.tab .ic{font-size:21px;display:block;margin-bottom:1px}
.page{display:none;padding:14px;animation:fIn .2s ease}
.page.on{display:block}
@keyframes fIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--c);border-radius:var(--rad);padding:14px;margin:8px 0;box-shadow:var(--sh)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--rad);font-size:17px;font-weight:600;cursor:pointer;margin:8px 0;transition:.15s;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-o{background:var(--o);color:#fff}

.tree-box{text-align:center;font-size:80px;height:110px;line-height:110px;transition:.4s}
.ring-wrap{width:180px;height:180px;margin:0 auto;position:relative}
.ring-wrap canvas{width:100%;height:100%}
.ring-t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-t .tm{font-size:36px;font-weight:700;font-family:monospace;letter-spacing:2px}
.ring-t .lb{font-size:12px;color:var(--g);margin-top:1px}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.chip{padding:7px 14px;border-radius:18px;border:2px solid #ddd;background:var(--c);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.chip.sel{border-color:var(--g);background:var(--g);color:#fff}
.task-sel{margin:8px 0;padding:10px;background:var(--c);border-radius:var(--rad);box-shadow:var(--sh);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-sel select{flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:var(--bg);color:var(--t)}
.task-sel .tp{font-size:11px;color:var(--gr)}

.ht-row{display:flex;align-items:center;gap:10px}
.ht-ck{min-width:40px;height:40px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:.15s;flex-shrink:0}
.ht-ck.done{background:var(--g);color:#fff}
.ht-info{flex:1;min-width:0}
.ht-n{font-weight:600;font-size:14px}
.ht-d{font-size:11px;color:var(--gr);margin-top:2px}
.ht-bar{height:5px;border-radius:3px;background:#e8e8e8;margin-top:5px}
.ht-fill{height:100%;border-radius:3px;transition:.4s}
.ht-s{min-width:36px;text-align:center;font-size:17px;font-weight:700;color:var(--g)}
.ht-s span{display:block;font-size:9px;color:var(--gr);font-weight:400}
.ht-act button{width:26px;height:26px;border:none;border-radius:50%;background:transparent;font-size:12px;cursor:pointer;color:var(--gr);flex-shrink:0}

.g-row{display:flex;align-items:center;gap:8px}
.g-pct{font-size:14px;font-weight:700;color:var(--g);min-width:40px;text-align:center}
.g-bar{flex:1;height:7px;border-radius:4px;background:#e8e8e8;overflow:hidden}
.g-fill{height:100%;border-radius:4px;background:var(--g);transition:.4s}
.g-time{font-size:11px;color:var(--gr);white-space:nowrap}

.f-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.f-card{background:var(--c);border-radius:var(--rad);padding:12px 8px;text-align:center;box-shadow:var(--sh)}
.f-emoji{font-size:38px}
.f-info{font-size:10px;color:var(--gr);margin-top:4px;line-height:1.4}
.st-row{display:flex;gap:8px;margin-bottom:12px}
.st{flex:1;background:var(--c);border-radius:var(--rad);padding:12px;text-align:center;box-shadow:var(--sh)}
.st .n{font-size:24px;font-weight:700}
.st .l{font-size:10px;color:var(--gr);margin-top:2px}

.chart{display:flex;align-items:flex-end;gap:5px;height:120px;justify-content:center}
.chart .col{display:flex;flex-direction:column;align-items:center;gap:3px}
.chart .bar{width:24px;border-radius:5px 5px 0 0;background:var(--gl);min-height:4px;transition:.4s}
.chart .lbl{font-size:10px;color:var(--gr)}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.hm div{aspect-ratio:1;border-radius:3px;background:#e8e8e8;transition:.2s}
.achs{display:flex;flex-wrap:wrap;gap:6px}
.ach{padding:5px 10px;border-radius:14px;font-size:12px;background:#e8f5e9}
.ach.lk{background:#eee;opacity:.4}
.btn-sm{font-size:13px;padding:10px;border:1px solid var(--r);color:var(--r);background:transparent;border-radius:var(--rad);cursor:pointer;margin:4px;width:100%}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:40;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="appbar" id="bar">🌳 自律森林</div>

<!-- FOCUS -->
<div class="page on" id="pg0">
<div style="max-width:360px;margin:0 auto">
<div class="tree-box" id="tree">🌰</div>
<div class="ring-wrap"><canvas id="ring"></canvas><div class="ring-t"><div class="tm" id="time">25:00</div><div class="lb" id="status">准备开始</div></div></div>
<div class="chips" id="chips"></div>
<!-- 选择当前任务 -->
<div class="task-sel" id="taskSel">
<select id="taskType" onchange="onTaskType()"><option value="">-- 选择任务类型 --</option><option value="habit">✅ 习惯</option><option value="goal">🎯 目标</option><option value="free">🌳 自由专注</option></select>
<select id="taskPick" style="display:none" onchange="onTaskPick()"></select>
<div class="tp" id="taskHint"></div>
</div>
<button class="btn btn-g" id="btnGo" onclick="start()">🌱 开始种树</button>
<button class="btn btn-r" id="btnStop" onclick="abort()" style="display:none">🥀 放弃（树会枯萎）</button>
</div>
</div>

<!-- HABITS -->
<div class="page" id="pg1">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 style="font-size:16px">✅ 习惯追踪</h3><button style="background:var(--g);color:#fff;border:none;padding:7px 12px;border-radius:14px;font-size:12px;cursor:pointer" onclick="addHabit()">+ 新建</button></div>
<div id="habitsList"></div>
<div style="margin-top:12px"><strong style="font-size:12px;color:var(--gr)">📅 本月打卡热力图</strong></div>
<div class="hm" id="heatmap"></div>
</div>

<!-- GOALS -->
<div class="page" id="pg2">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 style="font-size:16px">🎯 目标计划</h3><button style="background:var(--g);color:#fff;border:none;padding:7px 12px;border-radius:14px;font-size:12px;cursor:pointer" onclick="addGoal()">+ 新建</button></div>
<div id="goalsList"></div>
</div>

<!-- FOREST -->
<div class="page" id="pg3">
<h3 style="font-size:16px;margin-bottom:10px">🌳 我的森林</h3>
<div class="st-row" id="forestStats"></div>
<div class="f-grid" id="forestGrid"></div>
</div>

<!-- PROFILE -->
<div class="page" id="pg4">
<div class="card"><h3 style="font-size:15px;margin-bottom:8px">📊 本周专注（分钟）</h3><div class="chart" id="barChart"></div></div>
<div class="card"><h3 style="font-size:15px;margin-bottom:8px">🏆 成就</h3><div class="achs" id="achs"></div></div>
<div class="card"><h3 style="font-size:15px">🌟 积分：<b id="scoreVal">0</b></h3><p style="font-size:11px;color:var(--gr)">总专注：<b id="totalMin">0</b> 分钟 · <b id="totalSessions">0</b> 次</p></div>
<div style="display:flex;gap:8px"><button class="btn-sm" onclick="exportData()">📤 导出</button><button class="btn-sm" onclick="toggleDark()">🌓 深色</button></div>
<button class="btn-sm" onclick="resetAll()" style="margin-top:4px">🔄 重置</button>
</div>

<!-- TAB BAR -->
<div class="tabbar">
<div class="tab on" onclick="goTab(0)"><span class="ic">🍅</span>专注</div>
<div class="tab" onclick="goTab(1)"><span class="ic">✅</span>习惯</div>
<div class="tab" onclick="goTab(2)"><span class="ic">🎯</span>目标</div>
<div class="tab" onclick="goTab(3)"><span class="ic">🌳</span>森林</div>
<div class="tab" onclick="goTab(4)"><span class="ic">👤</span>我的</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
const TREE_TYPES=['oak','pine','cherry','bamboo','cactus','maple','willow','redwood'];
const TREE_NAMES=['橡树','松树','樱花','竹子','仙人掌','枫树','柳树','红杉'];
const TREE_EMOJI=['🌳','🌲','🌸','🎋','🌵','🍁','🌿','🏔️'];
const DURS=[20,25,30,45,60];

let timerId=null,elapsed=0,totalSec=1500,isBreak=false;
let habits=JSON.parse(localStorage.getItem('fh')||'[]');
let goals=JSON.parse(localStorage.getItem('fg')||'[]');
let sessions=JSON.parse(localStorage.getItem('fs')||'[]');
let score=parseInt(localStorage.getItem('fsc')||'0');
let dark=localStorage.getItem('fdark')==='1';
let selectedTask=null; // {type:'habit'|'goal'|'free', id:string, name:string}
if(dark)document.body.classList.add('dark');

function save(k){
let map={h:['fh',JSON.stringify(habits)],g:['fg',JSON.stringify(goals)],s:['fs',JSON.stringify(sessions)],c:['fsc',String(score)],d:['fdark',dark?'1':'0']};
let[key,val]=map[k];localStorage.setItem(key,val)
}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800)}
function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmtMins(m){if(m<60)return m+'分钟';let h=Math.floor(m/60);let r=m%60;return h+'小时'+(r>0?r+'分钟':'')}
function fmtDate(d){return d.slice(5)}

// ==================== TABS ====================
let currentTab=0;
function goTab(i){
currentTab=i;
document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
let pages=['pg0','pg1','pg2','pg3','pg4'];
document.getElementById(pages[i]).classList.add('on');
document.getElementById('bar').textContent=['🌳 自律森林','✅ 习惯追踪','🎯 目标计划','🌳 我的森林','👤 我的'][i];
if(i===1)rHabits();
if(i===2)rGoals();
if(i===3)rForest();
if(i===4)rProfile();
}

// ==================== FOCUS TIMER ====================
(function initFocus(){
let c=document.getElementById('chips');
DURS.forEach((d,i)=>{let e=document.createElement('div');e.className='chip'+(i===1?' sel':'');e.textContent=d+'分钟';e.onclick=()=>{c.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));e.classList.add('sel');totalSec=d*60;if(!timerId)document.getElementById('time').textContent=d+':00'};c.appendChild(e)});
updateTaskSelects();drawRing(0);
})();

function onTaskType(){
let t=document.getElementById('taskType').value;
let pick=document.getElementById('taskPick');pick.style.display='none';pick.innerHTML='';
selectedTask=null;document.getElementById('taskHint').textContent='';
if(t==='habit'){
pick.style.display='block';pick.innerHTML='<option value="">-- 选习惯 --</option>'+habits.filter(h=>!h.archived).map(h=>`<option value="${h.id}">${esc(h.name)} · 🔥${h.streak||0}天</option>`).join('');
}else if(t==='goal'){
pick.style.display='block';pick.innerHTML='<option value="">-- 选目标 --</option>'+goals.filter(g=>!g.archived).map(g=>`<option value="${g.id}">${esc(g.title)} · ${Math.round((g.done||0)/(g.tomatoes||10)*100)}%</option>`).join('');
}else if(t==='free'){selectedTask={type:'free',id:'',name:'自由专注'};document.getElementById('taskHint').textContent='🌳 自由专注模式'}
}
function onTaskPick(){
let type=document.getElementById('taskType').value;
let id=document.getElementById('taskPick').value;
if(!id){selectedTask=null;document.getElementById('taskHint').textContent='';return}
if(type==='habit'){let h=habits.find(x=>x.id===id);if(h)selectedTask={type:'habit',id:h.id,name:h.name};document.getElementById('taskHint').textContent='✅ '+h.name+' · 🔥'+h.streak+'天 · 健康度'+Math.round(h.health)+'%'}
else if(type==='goal'){let g=goals.find(x=>x.id===id);if(g)selectedTask={type:'goal',id:g.id,name:g.title};document.getElementById('taskHint').textContent='🎯 '+g.title+' · 进度'+Math.round((g.done||0)/(g.tomatoes||10)*100)+'%'}
}
function updateTaskSelects(){onTaskType();}

function start(){
if(timerId||isBreak)return;
elapsed=0;isBreak=false;
document.getElementById('btnGo').style.display='none';
document.getElementById('btnStop').style.display='block';
document.getElementById('status').textContent=selectedTask?'专注中 · '+selectedTask.name:'专注中';
document.getElementById('tree').textContent='🌰';
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='none');
document.getElementById('taskType').disabled=true;document.getElementById('taskPick').disabled=true;
drawRing(0);updateTree(0);
timerId=setInterval(tick,1000);
}

function tick(){
elapsed++;
let rem=Math.max(0,totalSec-elapsed);
let m=Math.floor(rem/60),s=rem%60;
document.getElementById('time').textContent=m+':'+(s<10?'0':'')+s;
let p=Math.min(elapsed/totalSec,1);
drawRing(p);updateTree(p);
if(elapsed>=totalSec){clearInterval(timerId);timerId=null;onDone();}
}

function onDone(){
document.getElementById('status').textContent='🎉 完成！';
document.getElementById('tree').textContent='🌳';
document.getElementById('btnStop').style.display='none';
document.getElementById('btnGo').style.display='block';
document.getElementById('btnGo').textContent='☕ 休息5分钟';
document.getElementById('btnGo').onclick=startBreak;
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='auto');
document.getElementById('taskType').disabled=false;document.getElementById('taskPick').disabled=false;

// Determine tree type based on task
let treeType='oak';
if(selectedTask&&selectedTask.type==='goal')treeType=TREE_TYPES[Math.min(Math.floor((goals.find(g=>g.id===selectedTask.id)?.done||0)/(goals.find(g=>g.id===selectedTask.id)?.tomatoes||10)*8),7)];
else if(selectedTask&&selectedTask.type==='habit'){let h=habits.find(x=>x.id===selectedTask.id);if(h)treeType=TREE_TYPES[Math.min(Math.floor(h.streak/7),7)]}

// Save session
let mins=Math.round(totalSec/60);
sessions.push({date:new Date().toISOString().slice(0,10),minutes:mins,completed:true,treeType,taskType:selectedTask?.type||'free',taskId:selectedTask?.id||'',taskName:selectedTask?.name||'自由专注'});
save('s');updateScore(10);

// Auto-update linked goal/habit
if(selectedTask&&selectedTask.type==='goal'){let g=goals.find(x=>x.id===selectedTask.id);if(g){g.done=(g.done||0)+1;save('g')}}
if(selectedTask&&selectedTask.type==='habit'){let h=habits.find(x=>x.id===selectedTask.id);if(h){h.done=true;h.streak=(h.streak||0)+1;h.health=Math.min(100,(h.health||50)+5);h.dates=h.dates||[];let today=new Date().toISOString().slice(0,10);if(!h.dates.includes(today))h.dates.push(today);h.totalMins=(h.totalMins||0)+mins;save('h');updateScore(5)}}

selectedTask=null;updateTaskSelects();
toast('🎉 完成！+10积分 · 种了一棵'+TREE_NAMES[TREE_TYPES.indexOf(treeType)]);try{navigator.vibrate?.([200,100,200])}catch(e){}
}

function startBreak(){
if(timerId)return;
elapsed=0;totalSec=300;isBreak=true;
document.getElementById('status').textContent='休息中 ☕';
document.getElementById('tree').textContent='😴';
document.getElementById('btnGo').style.display='none';
document.getElementById('btnGo').textContent='🌱 开始种树';
document.getElementById('btnGo').onclick=start;
drawRing(0);updateTree(0);
timerId=setInterval(()=>{
elapsed++;let rem=Math.max(0,totalSec-elapsed);let m=Math.floor(rem/60),s=rem%60;
document.getElementById('time').textContent=m+':'+(s<10?'0':'')+s;drawRing(elapsed/totalSec);
if(elapsed>=totalSec){clearInterval(timerId);timerId=null;isBreak=false;document.getElementById('status').textContent='准备开始';document.getElementById('tree').textContent='🌰';document.getElementById('btnGo').style.display='block';document.getElementById('btnGo').textContent='🌱 开始种树';document.getElementById('btnGo').onclick=start;drawRing(0);document.getElementById('time').textContent=totalSec/60+':00';toast('☕ 休息结束');try{navigator.vibrate?.([300])}catch(e){}}
},1000);
}

function abort(){
if(!timerId)return;clearInterval(timerId);timerId=null;
document.getElementById('btnGo').style.display='block';document.getElementById('btnStop').style.display='none';
document.getElementById('status').textContent='🥀 枯萎';document.getElementById('tree').textContent='🥀';
document.getElementById('btnGo').textContent='🌱 开始种树';document.getElementById('btnGo').onclick=start;
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='auto');
document.getElementById('taskType').disabled=false;document.getElementById('taskPick').disabled=false;
sessions.push({date:new Date().toISOString().slice(0,10),minutes:Math.floor(elapsed/60),completed:false,treeType:'withered',taskType:selectedTask?.type||'free',taskId:selectedTask?.id||'',taskName:selectedTask?.name||''});
save('s');
// If linked to habit, +1 interruption
if(selectedTask&&selectedTask.type==='habit'){let h=habits.find(x=>x.id===selectedTask.id);if(h){h.health=Math.max(5,(h.health||50)-5);h.streak=Math.max(0,(h.streak||1)-1);save('h')}}
selectedTask=null;updateTaskSelects();
drawRing(0);updateTree(0,true);document.getElementById('time').textContent=totalSec/60+':00';
toast('🥀 枯了 · 下次坚持住');
}

function updateTree(p,dead){let e=document.getElementById('tree');if(dead){e.textContent='🥀';return}e.textContent=p<0.2?'🌰':p<0.4?'🌱':p<0.65?'🌿':p<0.9?'🌸':'🌳'}
function drawRing(p){let c=document.getElementById('ring'),dpr=window.devicePixelRatio||1,sz=180;c.width=c.height=sz*dpr;c.style.width=c.style.height=sz+'px';let ctx=c.getContext('2d');ctx.scale(dpr,dpr);let cx=sz/2,cy=sz/2,r=70;ctx.clearRect(0,0,sz,sz);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#e0e0e0';ctx.lineWidth=9;ctx.stroke();if(p>0){ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*p);ctx.strokeStyle=isBreak?'#ff9800':'#4CAF50';ctx.lineWidth=9;ctx.lineCap='round';ctx.stroke()}}

// ==================== HABITS ====================
function rHabits(){
let el=document.getElementById('habitsList');
let active=habits.filter(h=>!h.archived);
if(active.length===0){el.innerHTML='<p style="text-align:center;color:var(--gr);padding:30px;font-size:13px">还没有习惯<br>点右上角 + 新建一个吧</p>'}
else el.innerHTML=active.map(h=>`<div class="card ht-row"><div class="ht-ck ${h.done?'done':''}" onclick="togH('${h.id}')">${h.done?'✓':'○'}</div><div class="ht-info"><div class="ht-n">${esc(h.name)}</div><div class="ht-d">${h.tier==='micro'?'🌱微':h.tier==='normal'?'🌿常':'🌳挑'} · ${h.totalMins?fmtMins(h.totalMins):'0分钟'} · 🍅${h.totalSessions||0}次</div><div class="ht-bar"><div class="ht-fill" style="width:${h.health||50}%;background:${(h.health||50)>80?'#4CAF50':(h.health||50)>50?'#ff9800':'#e53935'}"></div></div></div><div class="ht-s">${h.streak||0}<span>天连续</span></div><div class="ht-act"><button onclick="editH('${h.id}')" title="编辑">✏️</button><button onclick="delH('${h.id}')" title="删除">🗑</button></div></div>`).join('');
rHeatmap();
}

function togH(id){let h=habits.find(x=>x.id===id);if(!h)return;h.done=!h.done;if(h.done){h.streak=(h.streak||0)+1;h.health=Math.min(100,(h.health||50)+5);h.totalSessions=(h.totalSessions||0)+1;h.dates=h.dates||[];let t=new Date().toISOString().slice(0,10);if(!h.dates.includes(t))h.dates.push(t);updateScore(3)}else{h.streak=Math.max(0,(h.streak||1)-1);h.health=Math.max(5,(h.health||50)-3);h.totalSessions=Math.max(0,(h.totalSessions||1)-1)}save('h');rHabits()}

function addHabit(){let n=prompt('习惯名称（如：每日编程）');if(!n||!n.trim())return;let t=prompt('难度：\n1 = 🌱 微习惯\n2 = 🌿 正常\n3 = 🌳 挑战\n\n输入 1/2/3','2');habits.push({id:uid(),name:n.trim(),tier:t==='1'?'micro':t==='3'?'challenge':'normal',done:false,streak:0,health:50,dates:[],totalMins:0,totalSessions:0});save('h');rHabits();updateTaskSelects();toast('✅ 习惯已添加')}
function editH(id){let h=habits.find(x=>x.id===id);if(!h)return;let n=prompt('修改名称',h.name);if(n&&n.trim())h.name=n.trim();save('h');rHabits();updateTaskSelects();toast('✏️ 已更新')}
function delH(id){if(!confirm('确定删除这个习惯？'))return;habits=habits.filter(h=>h.id!==id);save('h');rHabits();updateTaskSelects();toast('🗑 已删除')}

function rHeatmap(){
let hm=document.getElementById('heatmap'),now=new Date(),cells=[];
let start=new Date(now.getFullYear(),now.getMonth(),1);
let totalDays=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
let dayOff=(start.getDay()+6)%7;
for(let i=0;i<dayOff;i++)cells.push('<div></div>');
for(let d=1;d<=totalDays;d++){
let ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
let cnt=habits.reduce((s,h)=>s+((h.dates||[]).includes(ds)?1:0),0);
let cl=['#ebedf0','#c6e48b','#7bc96f','#239a3b','#196127'];
cells.push(`<div style="background:${cl[Math.min(cnt,4)]}" title="${ds}: ${cnt}完成"></div>`);
}
hm.innerHTML=cells.join('');
}

// ==================== GOALS ====================
function rGoals(){
let el=document.getElementById('goalsList');
let active=goals.filter(g=>!g.archived);
if(active.length===0){el.innerHTML='<p style="text-align:center;color:var(--gr);padding:30px;font-size:13px">还没有目标<br>点右上角 + 新建一个吧</p>'}
else el.innerHTML=active.map(g=>{let pct=Math.min(100,Math.round(((g.done||0)/(g.tomatoes||10))*100));return`<div class="card g-row"><div class="g-pct">${pct}%</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${esc(g.title)}</div><div style="font-size:11px;color:var(--gr);margin:2px 0">🍅${g.done||0}/${g.tomatoes||10} · ${g.totalMins?fmtMins(g.totalMins):'0分钟'}</div><div class="g-bar"><div class="g-fill" style="width:${pct}%"></div></div></div><div class="g-time">${g.deadline?'⏰ '+g.deadline:''}</div><button style="border:none;background:var(--g);color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0" onclick="incG('${g.id}')">+</button><button style="border:none;background:transparent;color:var(--gr);font-size:12px;cursor:pointer;flex-shrink:0" onclick="delG('${g.id}')">🗑</button></div>`}).join('');
}

function incG(id){let g=goals.find(x=>x.id===id);if(!g)return;g.done=(g.done||0)+1;save('g');rGoals();toast('🍅 +1 · 进度'+Math.round((g.done)/(g.tomatoes||10)*100)+'%')}
function addGoal(){let t=prompt('目标名称（如：有机化学85分）');if(!t||!t.trim())return;let tom=parseInt(prompt('预估需要几个番茄钟？','20'))||20;let dl=prompt('截止日期（可选，如：2026-07-01）');goals.push({id:uid(),title:t.trim(),tomatoes:tom,done:0,totalMins:0,deadline:dl||''});save('g');rGoals();updateTaskSelects();toast('🎯 目标已添加')}
function delG(id){if(!confirm('确定删除？'))return;goals=goals.filter(g=>g.id!==id);save('g');rGoals();updateTaskSelects();toast('🗑 已删除')}

// ==================== FOREST ====================
function rForest(){
let total=sessions.length,alive=sessions.filter(s=>s.completed).length;
let dead=total-alive,totalMin=sessions.reduce((a,s)=>a+s.minutes,0);
document.getElementById('forestStats').innerHTML=`<div class="st"><div class="n" style="color:#4CAF50">${total}</div><div class="l">总次数</div></div><div class="st"><div class="n" style="color:#2E7D32">${alive}</div><div class="l">🌳成活</div></div><div class="st"><div class="n" style="color:#e53935">${dead}</div><div class="l">🥀枯萎</div></div><div class="st"><div class="n" style="color:#ff9800">${fmtMins(totalMin)}</div><div class="l">总时长</div></div>`;
let grid=document.getElementById('forestGrid');
if(sessions.length===0){grid.innerHTML='<p style="text-align:center;color:var(--gr);padding:30px;grid-column:1/-1;font-size:13px">还没有种过树<br>去专注页面选个任务开始吧 🌱</p>';return}
grid.innerHTML=sessions.slice(-15).reverse().map(s=>{let idx=TREE_TYPES.indexOf(s.treeType);let emoji=idx>=0?TREE_EMOJI[idx]:'🥀';return`<div class="f-card"><div class="f-emoji">${emoji}</div><div class="f-info">${s.taskName||'自由专注'}<br>${fmtDate(s.date)} · ${s.minutes}分钟<br>${s.completed?'✅完成':'❌中断'}</div></div>`}).join('');
}

// ==================== PROFILE ====================
function rProfile(){
document.getElementById('scoreVal').textContent=score;
let totalMin=sessions.filter(s=>s.completed).reduce((a,s)=>a+s.minutes,0);
document.getElementById('totalMin').textContent=totalMin;
document.getElementById('totalSessions').textContent=sessions.filter(s=>s.completed).length;

let bc=document.getElementById('barChart');
let days=['一','二','三','四','五','六','日'];
let wd=days.map((_,i)=>{let d=new Date();d.setDate(d.getDate()-(6-i));let ds=d.toISOString().slice(0,10);return sessions.filter(s=>s.date===ds&&s.completed).reduce((a,s)=>a+s.minutes,0)});
let mx=Math.max(...wd,10);
bc.innerHTML=wd.map((v,i)=>`<div class="col"><div class="bar" style="height:${Math.max(4,(v/mx)*110)}px;background:${i===6?'#81C784':'#4CAF50'}"></div><div class="lbl">${days[i]}</div></div>`).join('');

let streaks=[];if(sessions.length>0){let dates=[...new Set(sessions.filter(s=>s.completed).map(s=>s.date))].sort().reverse();let s=1;for(let i=1;i<dates.length;i++){let d1=new Date(dates[i-1]),d2=new Date(dates[i]);if((d1-d2)/864e5===1)s++;else break}streaks=[s]}
let ach=[{n:'🌱 初次种树',u:sessions.some(s=>s.completed)},{n:'🔥 连续3天',u:streaks[0]>=3},{n:'🌲 10棵树',u:sessions.filter(s=>s.completed).length>=10},{n:'📚 1000分钟',u:totalMin>=1000},{n:'⭐ 500积分',u:score>=500},{n:'🏅 连续7天',u:streaks[0]>=7}];
document.getElementById('achs').innerHTML=ach.map(a=>`<div class="ach${a.u?'':' lk'}">${a.n}</div>`).join('');
}

function updateScore(n){score+=n;save('c');if(currentTab===4)rProfile()}
function toggleDark(){dark=!dark;document.body.classList.toggle('dark',dark);save('d')}
function exportData(){let data={habits,goals,sessions,score,exported:new Date().toISOString()};let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='forest-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('📤 已导出')}
function resetAll(){if(!confirm('确定删除所有数据？建议先导出备份。'))return;habits=[];goals=[];sessions=[];score=0;['fh','fg','fs','fsc'].forEach(k=>localStorage.removeItem(k));save('c');if(currentTab===1)rHabits();if(currentTab===2)rGoals();if(currentTab===3)rForest();if(currentTab===4)rProfile();updateTaskSelects();toast('🔄 已重置')}

// ==================== INIT ====================
function initAll(){rHabits();rGoals();rForest();}
initAll();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&timerId)toast('⏰ 计时器运行中')});
</script>
</body>
</html>
