<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2E7D32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>阿梓的森林</title>
<style>
:root{--g:#5C6BC0;--gl:#7986CB;--bg:#f0f2fa;--c:#fff;--t:#1a1a1a;--gr:#888;--r:#e53935;--o:#ff9800;--b:#7E57C2;--rad:14px;--sh:0 2px 8px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Noto Sans SC',sans-serif;background:var(--bg);color:var(--t);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;padding-bottom:72px;overscroll-behavior:none;font-size:15px;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url(src/images/azusa/azusa_transparent.png) center/contain no-repeat;opacity:.04;pointer-events:none;z-index:0}
.appbar,.tabbar,.page{position:relative;z-index:1}
body.dark{--bg:#1a1a2e;--c:#16213e;--t:#e0e0e0;--gr:#999;--sh:0 2px 8px rgba(0,0,0,.3)}
body.locked{overflow:hidden;position:fixed;width:100%;height:100%}
.appbar{background:var(--g);color:#fff;padding:12px 16px;text-align:center;font-weight:700;font-size:17px;position:sticky;top:0;z-index:10}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--c);display:flex;border-top:1px solid rgba(0,0,0,.08);z-index:10;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;text-align:center;padding:7px 0 5px;font-size:10px;color:var(--gr);transition:.15s;cursor:pointer}
.tab.on{color:var(--g)}
.tab .ic{font-size:21px;display:block;margin-bottom:1px}
.page{display:none;padding:14px;animation:fIn .2s ease}
.page.on{display:block}
@keyframes fIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.card{background:var(--c);border-radius:var(--rad);padding:14px;margin:8px 0;box-shadow:var(--sh);transition:.2s}.card:active{transform:scale(.98)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:var(--rad);font-size:17px;font-weight:600;cursor:pointer;margin:8px 0;transition:.15s;letter-spacing:.5px}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-o{background:var(--o);color:#fff}

.tree-box{text-align:center;height:120px;display:flex;align-items:center;justify-content:center;transition:.4s;overflow:hidden}
.ring-wrap{width:180px;height:180px;margin:0 auto;position:relative}
.ring-wrap canvas{width:100%;height:100%}
.ring-t{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-t .tm{font-size:36px;font-weight:700;font-family:monospace;letter-spacing:2px}
.ring-t .lb{font-size:12px;color:var(--g);margin-top:1px}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.chip{padding:7px 14px;border-radius:18px;border:2px solid #ddd;background:var(--c);font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.chip.sel{border-color:var(--g);background:var(--g);color:#fff}
.task-sel{margin:8px 0;padding:10px;background:var(--c);border-radius:var(--rad);box-shadow:var(--sh);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.task-sel select{flex:1;min-width:120px;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:var(--bg);color:var(--t)}

.ht-row{display:flex;align-items:center;gap:10px}
.ht-ck{min-width:40px;height:40px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:.15s;flex-shrink:0}
.ht-ck.done{background:var(--g);color:#fff}
.ht-info{flex:1;min-width:0}
.ht-n{font-weight:600;font-size:14px}
.ht-d{font-size:11px;color:var(--gr);margin-top:2px}
.ht-bar{height:5px;border-radius:3px;background:#e8e8e8;margin-top:5px}
.ht-fill{height:100%;border-radius:3px;transition:.4s}
.ht-s{min-width:36px;text-align:center;font-size:17px;font-weight:700;color:var(--g)}
.ht-s span{display:block;font-size:9px;color:var(--gr);font-weight:400}

.g-row{display:flex;align-items:center;gap:8px}
.g-pct{font-size:14px;font-weight:700;color:var(--g);min-width:40px;text-align:center}
.g-bar{flex:1;height:7px;border-radius:4px;background:#e8e8e8;overflow:hidden}
.g-fill{height:100%;border-radius:4px;background:var(--g);transition:.4s}

/* Tree Gallery */
.tree-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}
.tg-card{background:var(--c);border-radius:var(--rad);padding:16px 10px;text-align:center;box-shadow:var(--sh);transition:.3s;position:relative;overflow:hidden;cursor:pointer}.tg-card:active{transform:scale(.95)}.tg-card.unlocked:hover{box-shadow:0 4px 16px rgba(92,107,192,.2)}
.tg-card.locked{opacity:.55;filter:grayscale(.6)}
.tg-card.unlocked{border:2px solid var(--g)}
.tg-card.current{border:2px solid var(--g);box-shadow:0 0 16px rgba(92,107,192,.3)}
.tg-emoji{font-size:50px;display:block}
.tg-name{font-weight:700;font-size:14px;margin:6px 0 2px}
.tg-sub{font-size:11px;color:var(--gr);line-height:1.4}
.tg-badge{position:absolute;top:8px;right:8px;background:var(--g);color:#fff;font-size:10px;padding:3px 8px;border-radius:10px}
.tg-badge.lock{background:#ccc}
.tg-progress{height:4px;border-radius:2px;background:#e8e8e8;margin-top:8px;overflow:hidden}
.tg-progress div{height:100%;border-radius:2px;background:var(--g);transition:.4s}
.tg-img{width:100%;height:120px;object-fit:contain;border-radius:10px;background:rgba(0,0,0,.03);display:block;margin:0 auto}
.tree-img{max-height:110px;max-width:100%;object-fit:contain;transition:all .5s ease;border-radius:8px}
.tree-box{text-align:center;height:120px;display:flex;align-items:center;justify-content:center;transition:.4s;overflow:hidden}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.pulse{animation:pulse 1.5s ease-in-out infinite;display:inline-block}
@keyframes unlockPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.unlock-pop{animation:unlockPop .6s ease}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.ach-card{background:var(--c);border-radius:10px;padding:10px 6px;text-align:center;box-shadow:var(--sh);transition:.2s;position:relative}
.ach-card.locked{opacity:.45;filter:grayscale(.8)}
.ach-card.unlocked{border:1px solid var(--g)}
.ach-card.tier-legend{background:linear-gradient(135deg,#fce4ec,#f3e5f5)}
.ach-icon{font-size:28px;display:block;margin-bottom:2px}
.ach-name{font-weight:600;font-size:11px;line-height:1.3}
.ach-tier{font-size:9px;margin-top:2px;padding:1px 6px;border-radius:8px;display:inline-block}
.tier-bronze{background:#ffe0b2;color:#e65100}
.tier-silver{background:#e0e0e0;color:#424242}
.tier-gold{background:#fff8e1;color:#f57f17}
.tier-legend{background:#f3e5f5;color:#6a1b9a}
.ach-header{display:flex;justify-content:space-between;align-items:center;margin:12px 0 6px}
.ach-count{font-size:13px;color:var(--g);font-weight:600}

/* Lock overlay */
.lock-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:20px}
.lock-overlay.show{display:flex}
.lock-overlay .lo-icon{font-size:80px;margin-bottom:16px}
.lock-overlay .lo-title{font-size:22px;font-weight:700;margin-bottom:8px}
.lock-overlay .lo-sub{font-size:14px;color:#ccc;margin-bottom:20px;line-height:1.6}
.lock-overlay .lo-btn{padding:12px 30px;border-radius:20px;border:none;font-size:16px;font-weight:600;cursor:pointer;margin:6px}
.lock-count{font-size:12px;color:#999;margin-top:12px}

.st-row{display:flex;gap:8px;margin-bottom:12px}
.st{flex:1;background:var(--c);border-radius:var(--rad);padding:12px;text-align:center;box-shadow:var(--sh)}
.st .n{font-size:24px;font-weight:700}
.st .l{font-size:10px;color:var(--gr);margin-top:2px}

.chart{display:flex;align-items:flex-end;gap:5px;height:120px;justify-content:center}
.chart .col{display:flex;flex-direction:column;align-items:center;gap:3px}
.chart .bar{width:24px;border-radius:5px 5px 0 0;background:var(--gl);min-height:4px;transition:.4s}
.chart .lbl{font-size:10px;color:var(--gr)}
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.hm div{aspect-ratio:1;border-radius:3px;background:#e8e8e8}
.achs{display:flex;flex-wrap:wrap;gap:6px}
.ach{padding:5px 10px;border-radius:14px;font-size:12px;background:#e8f5e9}
.ach.lk{background:#eee;opacity:.4}
.btn-sm{font-size:13px;padding:10px;border:1px solid var(--r);color:var(--r);background:transparent;border-radius:var(--rad);cursor:pointer;margin:4px;width:100%}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Section title */
.sec-title{font-size:16px;font-weight:700;margin:8px 0 4px;display:flex;align-items:center;gap:8px}
.sec-title .tip{font-size:11px;color:var(--gr);font-weight:400}
</style>
</head>
<body>

<div class="appbar" id="bar">🌸 阿梓的森林</div>

<!-- ===== LOCK OVERLAY ===== -->
<div class="lock-overlay" id="lockOverlay">
<div class="lo-icon">🌳</div>
<div class="lo-title" id="lockTitle">正在种树...</div>
<div class="lo-sub" id="lockMsg">你离开了专注页面<br>快回来！阿梓还在等你完成这棵树 🌸</div>
<button class="lo-btn" style="background:#4CAF50;color:#fff" onclick="resumeFocus()">🌱 回去继续专注</button>
<button class="lo-btn" style="background:rgba(255,255,255,.15);color:#fff" id="lockAbort" onclick="lockAbort()">放弃（还剩 <span id="lockLeft">0</span> 分钟）</button>
<div class="lock-count">今天已离开 <span id="lockCount">0</span>/3 次 · 超过3次树会枯萎</div>
</div>

<!-- ===== FOCUS PAGE ===== -->
<div class="page on" id="pg0">
<div style="max-width:360px;margin:0 auto">
<div class="tree-box" id="tree">🌰</div>
<div class="ring-wrap"><canvas id="ring"></canvas><div class="ring-t"><div class="tm" id="time">25:00</div><div class="lb" id="status">选个目标，开始种阿梓吧</div></div></div>
<div class="chips" id="chips"></div>
<div class="task-sel">
<select id="taskType" onchange="onTaskType()"><option value="">-- 选任务类型 --</option><option value="habit">✅ 习惯</option><option value="goal">🎯 目标</option><option value="free">🌸 自由种树</option></select>
<select id="taskPick" style="display:none" onchange="onTaskPick()"></select>
</div>
<div id="taskHint" style="text-align:center;font-size:12px;color:var(--gr);margin:4px 0;min-height:18px"></div>
<button class="btn btn-g" id="btnGo" onclick="start()">🌱 开始种树</button>
<button class="btn btn-r" id="btnStop" onclick="abort()" style="display:none">放弃（树会受伤的 😢）</button>
</div>
</div>

<!-- ===== TREE GALLERY PAGE ===== -->
<div class="page" id="pg1">
<h3 class="sec-title">🌸 阿梓树 · 升级路线 <span class="tip">| 专注就能解锁新衣服</span></h3>
<div class="tree-gallery" id="treeGallery"></div>
<div style="margin-top:16px">
<h3 class="sec-title">📊 我的进度</h3>
<div class="st-row" id="galleryStats"></div>
</div>
</div>

<!-- ===== HABITS PAGE ===== -->
<div class="page" id="pg2">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 class="sec-title">✅ 习惯追踪</h3><button style="background:var(--g);color:#fff;border:none;padding:7px 12px;border-radius:14px;font-size:12px;cursor:pointer" onclick="addHabit()">+ 新建</button></div>
<div id="habitsList"></div>
<div style="margin-top:12px"><strong style="font-size:12px;color:var(--gr)">📅 本月打卡热力图</strong></div>
<div class="hm" id="heatmap"></div>
</div>

<!-- ===== GOALS PAGE ===== -->
<div class="page" id="pg3">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><h3 class="sec-title">🎯 目标计划</h3><button style="background:var(--g);color:#fff;border:none;padding:7px 12px;border-radius:14px;font-size:12px;cursor:pointer" onclick="addGoal()">+ 新建</button></div>
<div id="goalsList"></div>
</div>

<!-- ===== PROFILE PAGE ===== -->
<div class="page" id="pg4">
<div class="card"><h3 style="font-size:15px;margin-bottom:8px">📊 本周专注（分钟）</h3><div class="chart" id="barChart"></div></div>
<div class="card"><h3 style="font-size:15px;margin-bottom:8px">🏆 成就</h3><div class="achs" id="achs"></div></div>
<div class="card"><h3 style="font-size:15px">🌟 积分：<b id="scoreVal">0</b></h3><p style="font-size:11px;color:var(--gr)">总专注：<b id="totalMin">0</b> 分钟 · 完成 <b id="totalSessions">0</b> 次</p></div>
<div style="display:flex;gap:8px"><button class="btn-sm" onclick="exportData()">📤 导出数据</button><button class="btn-sm" onclick="toggleDark()">🌓 深色模式</button></div>
<button class="btn-sm" onclick="resetAll()" style="margin-top:4px">🔄 重置</button>
</div>

<!-- ===== TAB BAR ===== -->
<div class="tabbar">
<div class="tab on" onclick="goTab(0)"><span class="ic">🌸</span>种树</div>
<div class="tab" onclick="goTab(1)"><span class="ic">👗</span>衣柜</div>
<div class="tab" onclick="goTab(2)"><span class="ic">✅</span>习惯</div>
<div class="tab" onclick="goTab(3)"><span class="ic">🎯</span>目标</div>
<div class="tab" onclick="goTab(4)"><span class="ic">👤</span>我的</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 阿梓树系统 ====================
// 阿梓的8套衣服 = 8个树等级。越专注解锁越多衣服。
const AZUSA_TREES=[
{id:'seed',name:'????????',img:'',emoji:'??',unlock:0,sub:'????????????????????',color:'#8D6E63'},
{id:'default',name:'??????????',img:'src/images/azusa/azusa_default.png',unlock:1,sub:'??1????????????????',color:'#90CAF9'},
{id:'newyear',name:'??????????',img:'src/images/azusa/azusa_newyear.png',unlock:5,sub:'??5????????????????',color:'#EF5350'},
{id:'summer',name:'?????????',img:'src/images/azusa/azusa_summer.jpg',unlock:12,sub:'??12????????????????',color:'#FF7043'},
{id:'panda',name:'????',img:'src/images/azusa/azusa_panda.png',unlock:20,sub:'??20?????????????????',color:'#4CAF50'},
{id:'rabbit',name:'????????',img:'src/images/azusa/azusa_rabbit.jpg',unlock:30,sub:'??30????????????????',color:'#FF80AB'},
{id:'frog',name:'??????????',img:'src/images/azusa/azusa_frog.jpg',unlock:40,sub:'??40????????????????',color:'#66BB6A'},
{id:'butterfly',name:'??????????',img:'src/images/azusa/azusa_butterfly.jpg',unlock:55,sub:'??55????????????????',color:'#CE93D8'},
{id:'eggplant',name:'????????',img:'src/images/azusa/azusa_eggplant.png',unlock:70,sub:'??70?????????????????',color:'#9575CD'},
{id:'spring',name:'??????????',img:'src/images/azusa/azusa_spring.png',unlock:90,sub:'??90????????????????',color:'#81C784'},
{id:'chibi',name:'?????????',img:'src/images/azusa/azusa_chibi.png',unlock:110,sub:'??110????????????',color:'#FFD700'},
{id:'gift',name:'???????????',img:'src/images/azusa/azusa_gift.gif',unlock:130,sub:'??130?????????live2D',color:'#FF8A65'},
{id:'ninja',name:'????????',img:'src/images/azusa/azusa_ninja.jpg',unlock:155,sub:'??155????????????????',color:'#7E57C2'},
{id:'ultimate',name:'??????????',img:'src/images/azusa/azusa_transparent.png',unlock:180,sub:'??180?????????????????',color:'#E040FB'},
];

let currentTreeIdx=0; // which tree the user is currently at
let totalCompletions=0; // total completed sessions

// ==================== STATE ====================
const DURS=[20,25,30,45,60];
let timerId=null,elapsed=0,totalSec=1500,isBreak=false,lockExits=0;
let habits=JSON.parse(localStorage.getItem('fh')||'[]');
let goals=JSON.parse(localStorage.getItem('fg')||'[]');
let sessions=JSON.parse(localStorage.getItem('fs')||'[]');
let score=parseInt(localStorage.getItem('fsc')||'0');
let dark=localStorage.getItem('fdark')==='1';
let selectedTask=null;
totalCompletions=sessions.filter(s=>s.completed).length;
updateCurrentTree();
if(dark)document.body.classList.add('dark');

function updateCurrentTree(){
for(let i=AZUSA_TREES.length-1;i>=0;i--){if(totalCompletions>=AZUSA_TREES[i].unlock){currentTreeIdx=i;break}}
}
function save(k){
let map={h:['fh',JSON.stringify(habits)],g:['fg',JSON.stringify(goals)],s:['fs',JSON.stringify(sessions)],c:['fsc',String(score)],d:['fdark',dark?'1':'0']};
let[key,val]=map[k];localStorage.setItem(key,val)
}
function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2000)}
function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmtMins(m){if(m<60)return m+'分钟';let h=Math.floor(m/60);let r=m%60;return h+'小时'+(r>0?r+'分钟':'')}

// ==================== TABS ====================
let currentTab=0;
function goTab(i){currentTab=i;document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));document.getElementById(['pg0','pg1','pg2','pg3','pg4'][i]).classList.add('on');document.getElementById('bar').textContent=['🌸 阿梓的森林','👗 阿梓的衣柜','✅ 习惯追踪','🎯 目标计划','👤 我的'][i];if(i===1)rGallery();if(i===2)rHabits();if(i===3)rGoals();if(i===4)rProfile()}

// ==================== FOCUS TIMER ====================
(function initFocus(){
let c=document.getElementById('chips');
DURS.forEach((d,i)=>{let e=document.createElement('div');e.className='chip'+(i===1?' sel':'');e.textContent=d+'分钟';e.onclick=()=>{c.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));e.classList.add('sel');totalSec=d*60;if(!timerId)document.getElementById('time').textContent=d+':00'};c.appendChild(e)});
updateTaskSelects();drawRing(0);
document.getElementById('lockLeft').textContent=Math.floor(totalSec/60);
})();

function onTaskType(){
let t=document.getElementById('taskType').value;
let pick=document.getElementById('taskPick');pick.style.display='none';pick.innerHTML='';
selectedTask=null;document.getElementById('taskHint').textContent='';
if(t==='habit'){pick.style.display='block';pick.innerHTML='<option value="">-- 选习惯 --</option>'+habits.filter(h=>!h.archived).map(h=>`<option value="${h.id}">${esc(h.name)} · 🔥${h.streak||0}天</option>`).join('')}
else if(t==='goal'){pick.style.display='block';pick.innerHTML='<option value="">-- 选目标 --</option>'+goals.filter(g=>!g.archived).map(g=>`<option value="${g.id}">${esc(g.title)} · ${Math.round((g.done||0)/(g.tomatoes||10)*100)}%</option>`).join('')}
else if(t==='free'){selectedTask={type:'free',id:'',name:'自由种树'};document.getElementById('taskHint').textContent='🌸 自由种树模式 · 为阿梓收集衣装'}
}
function onTaskPick(){
let type=document.getElementById('taskType').value,id=document.getElementById('taskPick').value;
if(!id){selectedTask=null;document.getElementById('taskHint').textContent='';return}
if(type==='habit'){let h=habits.find(x=>x.id===id);if(h)selectedTask={type:'habit',id:h.id,name:h.name};document.getElementById('taskHint').textContent='✅ '+h.name+' · 坚持就是胜利'}
else if(type==='goal'){let g=goals.find(x=>x.id===id);if(g)selectedTask={type:'goal',id:g.id,name:g.title};document.getElementById('taskHint').textContent='🎯 '+g.title+' · 加油！'}
}
function updateTaskSelects(){onTaskType()}

function start(){
if(timerId||isBreak)return;
elapsed=0;isBreak=false;lockExits=0;
document.getElementById('btnGo').style.display='none';document.getElementById('btnStop').style.display='block';
document.getElementById('status').textContent=selectedTask?'和阿梓一起专注 · '+selectedTask.name:'和阿梓一起专注';
document.getElementById('tree').textContent='🌰';
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='none');
document.getElementById('taskType').disabled=true;document.getElementById('taskPick').disabled=true;
document.getElementById('lockLeft').textContent=Math.floor(totalSec/60);
document.getElementById('lockCount').textContent='0';
drawRing(0);updateTree(0);
timerId=setInterval(tick,1000);
}

function tick(){
elapsed++;
let rem=Math.max(0,totalSec-elapsed);let m=Math.floor(rem/60),s=rem%60;
document.getElementById('time').textContent=m+':'+(s<10?'0':'')+s;
document.getElementById('lockLeft').textContent=m;
let p=Math.min(elapsed/totalSec,1);drawRing(p);updateTree(p);
if(elapsed>=totalSec){clearInterval(timerId);timerId=null;onDone();}
}

function onDone(){
document.getElementById('status').textContent='🎉 太棒了！';
// Current tree emoji based on what was unlocked
let curTree=AZUSA_TREES[Math.min(currentTreeIdx+1,AZUSA_TREES.length-1)];
if(curTree.img)document.getElementById('tree').innerHTML='<img src='+curTree.img+' class=tree-img>';else document.getElementById('tree').textContent=curTree.emoji||'??';
document.getElementById('btnStop').style.display='none';document.getElementById('btnGo').style.display='block';
document.getElementById('btnGo').textContent='☕ 休息一下';document.getElementById('btnGo').onclick=startBreak;
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='auto');
document.getElementById('taskType').disabled=false;document.getElementById('taskPick').disabled=false;

let mins=Math.round(totalSec/60);
sessions.push({date:new Date().toISOString().slice(0,10),minutes:mins,completed:true,taskType:selectedTask?.type||'free',taskId:selectedTask?.id||'',taskName:selectedTask?.name||'自由种树'});
save('s');updateScore(10);
totalCompletions=sessions.filter(s=>s.completed).length;updateCurrentTree();

if(selectedTask&&selectedTask.type==='goal'){let g=goals.find(x=>x.id===selectedTask.id);if(g){g.done=(g.done||0)+1;g.totalMins=(g.totalMins||0)+mins;save('g')}}
if(selectedTask&&selectedTask.type==='habit'){let h=habits.find(x=>x.id===selectedTask.id);if(h){h.done=true;h.streak=(h.streak||0)+1;h.health=Math.min(100,(h.health||50)+5);h.dates=h.dates||[];let t=new Date().toISOString().slice(0,10);if(!h.dates.includes(t))h.dates.push(t);h.totalMins=(h.totalMins||0)+mins;h.totalSessions=(h.totalSessions||0)+1;save('h');updateScore(5)}}

// Check if new tree unlocked
let newTree=null;
for(let i=AZUSA_TREES.length-1;i>currentTreeIdx;i--){if(totalCompletions>=AZUSA_TREES[i].unlock){newTree=AZUSA_TREES[i];break}}
selectedTask=null;updateTaskSelects();
if(newTree)toast('🌸 新衣装解锁！'+newTree.name);else toast('🎉 专注完成！离下一件衣装更近了');
try{navigator.vibrate?.([200,100,200])}catch(e){}
}

function startBreak(){
if(timerId)return;
elapsed=0;totalSec=300;isBreak=true;
document.getElementById('status').textContent='休息一下 ☕';document.getElementById('tree').textContent='😴';
document.getElementById('btnGo').style.display='none';document.getElementById('btnGo').textContent='🌱 开始种树';document.getElementById('btnGo').onclick=start;
drawRing(0);updateTree(0);
timerId=setInterval(()=>{
elapsed++;let rem=Math.max(0,totalSec-elapsed);let m=Math.floor(rem/60),s=rem%60;
document.getElementById('time').textContent=m+':'+(s<10?'0':'')+s;drawRing(elapsed/totalSec);
if(elapsed>=totalSec){clearInterval(timerId);timerId=null;isBreak=false;document.getElementById('status').textContent='准备开始';document.getElementById('tree').textContent='🌰';document.getElementById('btnGo').style.display='block';document.getElementById('btnGo').textContent='🌱 开始种树';document.getElementById('btnGo').onclick=start;drawRing(0);document.getElementById('time').textContent=totalSec/60+':00';toast('☕ 休息好了，继续加油！');try{navigator.vibrate?.([300])}catch(e){}}
},1000);
}

function abort(){
if(!timerId)return;clearInterval(timerId);timerId=null;
document.getElementById('btnGo').style.display='block';document.getElementById('btnStop').style.display='none';
document.getElementById('status').textContent='没关系，下次一定可以的 🌸';
document.getElementById('tree').textContent='😢';document.getElementById('btnGo').textContent='🌱 重新开始';
document.getElementById('btnGo').onclick=start;
document.querySelectorAll('#chips .chip').forEach(c=>c.style.pointerEvents='auto');
document.getElementById('taskType').disabled=false;document.getElementById('taskPick').disabled=false;
sessions.push({date:new Date().toISOString().slice(0,10),minutes:Math.floor(elapsed/60),completed:false,taskType:selectedTask?.type||'free',taskId:selectedTask?.id||''});
save('s');
if(selectedTask&&selectedTask.type==='habit'){let h=habits.find(x=>x.id===selectedTask.id);if(h){h.health=Math.max(5,(h.health||50)-3);save('h')}}
selectedTask=null;updateTaskSelects();
drawRing(0);updateTree(0,true);document.getElementById('time').textContent=totalSec/60+':00';
document.getElementById('lockOverlay').classList.remove('show');
toast('🌸 没关系，阿梓会等你');
}

function updateTree(p,dead){
let e=document.getElementById('tree');
if(dead){e.innerHTML='<span style=font-size:80px>??</span>';return}
let stage,img;
if(p<0.15){
e.innerHTML='<span style=font-size:70px class=pulse>??</span>'
}else if(p<0.4){
stage=Math.min(currentTreeIdx+1,AZUSA_TREES.length-1);
img=AZUSA_TREES[stage].img;
if(img)e.innerHTML='<img src='+img+' class=tree-img style=opacity:.5;transform:scale(.7)>';
else e.innerHTML='<span style=font-size:60px>??</span>'
}else if(p<0.7){
stage=Math.min(currentTreeIdx+2,AZUSA_TREES.length-1);
img=AZUSA_TREES[stage].img;
if(img)e.innerHTML='<img src='+img+' class=tree-img style=opacity:.8;transform:scale(.85)>';
else e.innerHTML='<span style=font-size:70px>'+AZUSA_TREES[stage].emoji+'</span>'
}else{
stage=Math.min(currentTreeIdx+3,AZUSA_TREES.length-1);
img=AZUSA_TREES[stage].img;
if(img)e.innerHTML='<img src='+img+' class=tree-img style=opacity:1;transform:scale(1)>';
else e.innerHTML='<span style=font-size:80px>'+AZUSA_TREES[stage].emoji+'</span>'
}}
function rGallery(){
let el=document.getElementById('treeGallery');
el.innerHTML=AZUSA_TREES.map((t,i)=>{
let unlocked=i<=currentTreeIdx;
let isNext=i===currentTreeIdx+1;
let progress=unlocked?100:isNext?Math.round((totalCompletions-AZUSA_TREES[currentTreeIdx].unlock)/(t.unlock-AZUSA_TREES[currentTreeIdx].unlock)*100):0;
let cls=unlocked?(i===currentTreeIdx?'current':'unlocked'):'locked';
let badge=unlocked?(i===currentTreeIdx?'?? ??':'? ???'):'?? '+(isNext?'???':'?'+t.unlock+'?');
let visual=t.img?`<img src="${t.img}" class="tg-img" alt="${t.name}" loading="lazy">`:`<span class="tg-emoji">${t.emoji}</span>`;
return`<div class="tg-card ${cls}"><span class="tg-badge ${unlocked?'':'lock'}">${badge}</span>${visual}<div class="tg-name">${t.name}</div><div class="tg-sub">${t.sub}</div>${!unlocked?`<div class="tg-progress"><div style="width:${isNext?progress:0}%"></div></div>`:''}</div>`}).join('')}

// ==================== HABITS ====================
function rHabits(){
let el=document.getElementById('habitsList');
let active=habits.filter(h=>!h.archived);
if(active.length===0)el.innerHTML='<p style="text-align:center;color:var(--gr);padding:30px;font-size:13px">还没有习惯<br>点右上角 + 新建</p>';
else el.innerHTML=active.map(h=>`<div class="card ht-row"><div class="ht-ck ${h.done?'done':''}" onclick="togH('${h.id}')">${h.done?'✓':'○'}</div><div class="ht-info"><div class="ht-n">${esc(h.name)}</div><div class="ht-d">${h.tier==='micro'?'🌱微':h.tier==='normal'?'🌿常':'🌳挑'} · ${h.totalMins?fmtMins(h.totalMins):'0'} · 🍅${h.totalSessions||0}次</div><div class="ht-bar"><div class="ht-fill" style="width:${h.health||50}%;background:${(h.health||50)>80?'#4CAF50':(h.health||50)>50?'#ff9800':'#e53935'}"></div></div></div><div class="ht-s">${h.streak||0}<span>天</span></div><div class="ht-act"><button onclick="delH('${h.id}')">🗑</button></div></div>`).join('');
rHeatmap();
}
function togH(id){let h=habits.find(x=>x.id===id);if(!h)return;h.done=!h.done;if(h.done){h.streak=(h.streak||0)+1;h.health=Math.min(100,(h.health||50)+5);h.totalSessions=(h.totalSessions||0)+1;h.dates=h.dates||[];let t=new Date().toISOString().slice(0,10);if(!h.dates.includes(t))h.dates.push(t);updateScore(3)}else{h.streak=Math.max(0,(h.streak||1)-1);h.health=Math.max(5,(h.health||50)-3)}save('h');rHabits()}
function addHabit(){let n=prompt('习惯名称');if(!n||!n.trim())return;let t=prompt('难度：1=🌱微习惯 2=🌿正常 3=🌳挑战','2');habits.push({id:uid(),name:n.trim(),tier:t==='1'?'micro':t==='3'?'challenge':'normal',done:false,streak:0,health:50,dates:[],totalMins:0,totalSessions:0});save('h');rHabits();updateTaskSelects();toast('✅ 习惯已添加')}
function delH(id){if(!confirm('确定删除？'))return;habits=habits.filter(h=>h.id!==id);save('h');rHabits();updateTaskSelects()}
function rHeatmap(){
let hm=document.getElementById('heatmap'),now=new Date(),cells=[];
let start=new Date(now.getFullYear(),now.getMonth(),1);
let totalDays=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
let dayOff=(start.getDay()+6)%7;
for(let i=0;i<dayOff;i++)cells.push('<div></div>');
for(let d=1;d<=totalDays;d++){
let ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
let cnt=habits.reduce((s,h)=>s+((h.dates||[]).includes(ds)?1:0),0);
cells.push(`<div style="background:${['#ebedf0','#c6e48b','#7bc96f','#239a3b','#196127'][Math.min(cnt,4)]}" title="${ds}: ${cnt}完成"></div>`);
}
hm.innerHTML=cells.join('');
}

// ==================== GOALS ====================
function rGoals(){
let el=document.getElementById('goalsList');
let active=goals.filter(g=>!g.archived);
if(active.length===0)el.innerHTML='<p style="text-align:center;color:var(--gr);padding:30px;font-size:13px">还没有目标<br>点右上角 + 新建</p>';
else el.innerHTML=active.map(g=>{let pct=Math.min(100,Math.round(((g.done||0)/(g.tomatoes||10))*100));return`<div class="card g-row"><div class="g-pct">${pct}%</div><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${esc(g.title)}</div><div style="font-size:11px;color:var(--gr)">🍅${g.done||0}/${g.tomatoes||10} · ${g.totalMins?fmtMins(g.totalMins):'0'}</div><div class="g-bar"><div class="g-fill" style="width:${pct}%"></div></div></div><button style="border:none;background:var(--g);color:#fff;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;flex-shrink:0" onclick="incG('${g.id}')">+</button><button style="border:none;background:transparent;color:var(--gr);font-size:12px;cursor:pointer;flex-shrink:0" onclick="delG('${g.id}')">🗑</button></div>`}).join('')}
function incG(id){let g=goals.find(x=>x.id===id);if(!g)return;g.done=(g.done||0)+1;save('g');rGoals()}
function addGoal(){let t=prompt('目标名称');if(!t||!t.trim())return;let tom=parseInt(prompt('预估番茄钟数','20'))||20;goals.push({id:uid(),title:t.trim(),tomatoes:tom,done:0,totalMins:0});save('g');rGoals();updateTaskSelects();toast('🎯 已添加')}
function delG(id){if(!confirm('确定删除？'))return;goals=goals.filter(g=>g.id!==id);save('g');rGoals();updateTaskSelects()}

// ==================== PROFILE ====================
function rProfile(){
document.getElementById('scoreVal').textContent=score;
let totalMin=sessions.filter(s=>s.completed).reduce((a,s)=>a+s.minutes,0);
document.getElementById('totalMin').textContent=totalMin;
document.getElementById('totalSessions').textContent=sessions.filter(s=>s.completed).length;

let bc=document.getElementById('barChart'),days=['一','二','三','四','五','六','日'];
let wd=days.map((_,i)=>{let d=new Date();d.setDate(d.getDate()-(6-i));let ds=d.toISOString().slice(0,10);return sessions.filter(s=>s.date===ds&&s.completed).reduce((a,s)=>a+s.minutes,0)});

function updateScore(n){score+=n;save('c');if(currentTab===4)rProfile()}
function toggleDark(){dark=!dark;document.body.classList.toggle('dark',dark);save('d')}
function exportData(){let data={habits,goals,sessions,score,exported:new Date().toISOString()};let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='azusa-forest-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('📤 已导出')}
function resetAll(){if(!confirm('确定删除？建议先导出备份。'))return;habits=[];goals=[];sessions=[];score=0;totalCompletions=0;currentTreeIdx=0;['fh','fg','fs','fsc'].forEach(k=>localStorage.removeItem(k));save('c');if(currentTab===1)rGallery();if(currentTab===2)rHabits();if(currentTab===3)rGoals();if(currentTab===4)rProfile();updateTaskSelects();toast('🔄 已重置')}
