name: 构建阿梓森林APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: false
        default: "3.5.3"
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    name: 编译APK
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装Android SDK
        run: |
          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android-sdk/cmdline-tools
          mv $HOME/android-sdk/cmdline-tools/cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          # 设置环境变量
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

          # 接受许可并安装SDK组件
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: 安装Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: 生成Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: 编译APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 查找APK
        working-directory: android
        run: find . -name "*.apk" -type f

      - name: 签名APK
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK: $APK"
          test -n "$APK" || exit 1
          # 生成签名
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Debug" 2>/dev/null || true
          # 签名
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore debug.keystore -storepass android -keypass android \
            "$APK" debug 2>/dev/null || true
          # 对齐
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK" \
            app/build/outputs/apk/release/azusa-forest.apk 2>/dev/null || \
            cp "$APK" app/build/outputs/apk/release/azusa-forest.apk
          ls -la app/build/outputs/apk/release/

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: azusa-forest-apk
          path: android/app/build/outputs/apk/release/azusa-forest.apk
          retention-days: 30

      - name: 创建Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '3.5.3' }}-android
          name: "阿梓的森林 APK v${{ github.event.inputs.version || '3.5.3' }}"
          body: |
            ## 阿梓的森林 Android APK

            ### 华为手机安装步骤
            1. 下载APK文件到手机
            2. 文件管理 → 找到APK → 点击安装
            3. 若提示"未知来源" → 去设置允许
            4. 桌面出现"阿梓的森林"图标

            ### 技术说明
            WebView封装 · 数据存本地 · 适配华为/鸿蒙 Android 7.0+
          files: android/app/build/outputs/apk/release/azusa-forest.apk
