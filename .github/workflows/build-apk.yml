name: 构建阿梓森林APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: false
        default: "3.5.3"
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: 编译APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: 安装Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: 生成Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: 编译APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 查看编译结果
        working-directory: android
        run: find . -name "*.apk" -type f

      - name: 签名APK
        working-directory: android
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Found: $APK"
          if [ -z "$APK" ]; then echo "NO APK FOUND!"; exit 1; fi
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug" 2>/dev/null || true
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -storepass android -keypass android "$APK" debug 2>/dev/null || true
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK" app/build/outputs/apk/release/azusa-forest.apk 2>/dev/null || cp "$APK" app/build/outputs/apk/release/azusa-forest.apk
          ls -la app/build/outputs/apk/release/

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: azusa-forest-apk
          path: android/app/build/outputs/apk/release/azusa-forest.apk
          retention-days: 30

      - name: 创建Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '3.5.3' }}-android
          name: "阿梓的森林 APK v${{ github.event.inputs.version || '3.5.3' }}"
          body: |
            ## 阿梓的森林 Android安装包

            ### 安装方法
            1. 下载APK到华为手机
            2. 文件管理→找到APK→点击安装
            3. 若提示"未知来源"→设置中允许
            4. 桌面出现"阿梓的森林"即完成

            ### 说明
            - WebView封装，内容来自GitHub Pages
            - 数据存手机本地，不需注册
            - 适配华为/鸿蒙 Android 7.0+
          files: android/app/build/outputs/apk/release/azusa-forest.apk
          draft: false
          prerelease: false
