name: 构建阿梓森林APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mingc/android-build-box:latest

    steps:
      - uses: actions/checkout@v4

      - name: 生成Gradle Wrapper
        working-directory: android
        run: |
          if command -v gradle &> /dev/null; then
            gradle wrapper --gradle-version 8.5
          else
            wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
            unzip -q gradle-8.5-bin.zip
            ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          fi

      - name: 编译APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 签名并打包
        working-directory: android
        run: |
          APK=$(find app/build -name "*.apk" | head -1)
          echo "APK=$APK"
          test -n "$APK" || exit 1
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug" 2>/dev/null || true
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -storepass android -keypass android "$APK" debug 2>/dev/null || true
          mkdir -p app/build/outputs/apk/release
          cp "$APK" app/build/outputs/apk/release/azusa-forest.apk

      - uses: actions/upload-artifact@v4
        with:
          name: azusa-forest-apk
          path: android/app/build/outputs/apk/release/azusa-forest.apk
