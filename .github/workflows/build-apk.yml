name: 构建阿梓森林APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: false
        default: "3.5.3"
  push:
    branches: [master]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: 编译APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 安装Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: 安装Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 生成Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.5

      - name: 编译APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 签名APK
        working-directory: android
        run: |
          APK_UNSIGNED=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
          echo "APK: $APK_UNSIGNED"
          if [ -z "$APK_UNSIGNED" ]; then
            echo "ERROR: No APK found!"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          keytool -genkey -v -keystore debug.keystore -alias debug -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Debug, OU=Dev, O=Forest, L=City, S=State, C=CN" 2>/dev/null || true
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore debug.keystore -storepass android -keypass android "$APK_UNSIGNED" debug 2>/dev/null || true
          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK_UNSIGNED" app/build/outputs/apk/release/azusa-forest-signed.apk 2>/dev/null || cp "$APK_UNSIGNED" app/build/outputs/apk/release/azusa-forest-signed.apk
          ls -la app/build/outputs/apk/release/

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: azusa-forest-apk
          path: android/app/build/outputs/apk/release/azusa-forest-signed.apk
          retention-days: 30

      - name: 创建Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '3.5.3' }}-android
          name: "阿梓的森林 Android APK v${{ github.event.inputs.version || '3.5.3' }}"
          body: |
            ## 阿梓的森林 Android安装包

            > 番茄钟 + 阿梓伙伴 + 衣装收集

            ### 安装方法
            1. 下载APK文件
            2. 华为手机：打开"文件管理"→找到下载的APK→点击安装
            3. 如果提示"未知来源"，在设置中允许"外部来源应用安装"
            4. 安装完成后桌面会出现"阿梓的森林"图标

            ### 技术说明
            - 基于WebView封装，内部打开GitHub Pages在线版
            - 所有数据存储在手机本地，不上传任何服务器
            - 需要联网使用（首次加载后支持部分离线）
            - 适配华为/鸿蒙 Android 7.0+
          files: android/app/build/outputs/apk/release/azusa-forest-signed.apk
          draft: false
          prerelease: false
