name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'docs/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('twa-project/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Create keystore
        run: |
          keytool -genkey -v \
            -keystore forest-focus.keystore \
            -alias forestfocus \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass azusa2026 \
            -keypass azusa2026 \
            -dname "CN=Forest Focus, OU=Dev, O=HuanWei, L=Beijing, ST=Beijing, C=CN"

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Initialize TWA
        run: |
          mkdir -p twa-project
          cd twa-project
          { printf "n\n%s\n" "$JAVA_HOME"; yes ""; } | bubblewrap init \
            --manifest "https://huanweide.github.io/forest-focus/manifest.json" \
            --directory .

      - name: Build APK
        working-directory: twa-project
        run: bubblewrap build

      - name: Copy APK
        run: |
          mkdir -p docs/download
          find twa-project -name "*.apk" -exec cp {} docs/download/forest-focus.apk \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: forest-focus-apk
          path: docs/download/forest-focus.apk

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/download/forest-focus.apk
          git diff --staged --quiet || git commit -m "auto: build APK [skip ci]"
          git push
